<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Helpers — Blob Tools</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f3f4f6; color: #111827; line-height: 1.5; }
    main { max-width: 640px; margin: 0 auto; padding: 32px 20px; }
    .grid { display: grid; gap: 16px; margin-top: 20px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; text-decoration: none; color: inherit; }
    .card:hover { border-color: #93c5fd; box-shadow: 0 8px 24px rgba(15,23,42,.08); }
    .card h2 { margin: 0 0 8px; font-size: 18px; }
    .card p { margin: 0; color: #4b5563; font-size: 14px; }
    .tag { display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 600; color: #1e3a8a; background: #eef2ff; padding: 4px 10px; border-radius: 999px; }
  </style>
</head>
<body>
  <main>
    <h1>Blob Tools</h1>
    <p>Browser tools để convert blob URL và ghép PDF từ Google Drive.</p>
    <div class="grid">
      <a class="card" href="/blob2image/">
        <h2>Blob2Image</h2>
        <p>Convert blob URL TikTok sang PNG / JPEG / WebP.</p>
        <span class="tag">Bookmarklet</span>
      </a>
      <a class="card" href="/drive2pdf/">
        <h2>Drive2PDF</h2>
        <p>Ghép trang ảnh Google Drive thành PDF qua Console.</p>
        <span class="tag">Console script</span>
      </a>
    </div>
  </main>
</body>
</html>
